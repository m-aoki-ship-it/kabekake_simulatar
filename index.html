<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>壁掛けテレビ ARシミュレーター | Craft-Mind</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@300;400;500;700&display=swap');

  :root {
    --bg:      #f2f5f8;
    --surface: #ffffff;
    --navy:    #2c3e50;
    --slate:   #4a6280;
    --accent:  #2c5282;
    --sky:     #29abe2;
    --muted:   #8a9ab0;
    --border:  #dde3ea;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--navy);
    font-family: 'M PLUS Rounded 1c', 'Hiragino Maru Gothic Pro', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo { font-size: 13px; font-weight: 500; letter-spacing: 4px; color: var(--navy); }
  .logo span { color: var(--accent); }
  .header-sub { font-size: 9px; color: var(--muted); letter-spacing: 2px; }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 24px 32px;
    gap: 36px;
  }

  .tv-illustration { width: 140px; height: 116px; }

  .title-block { text-align: center; }
  .title-block h1 { font-size: 26px; font-weight: 700; line-height: 1.5; letter-spacing: 2px; }
  .title-block p { margin-top: 10px; font-size: 13px; font-weight: 400; color: var(--slate); line-height: 2; }

  .size-section { width: 100%; max-width: 360px; }
  .size-label { font-size: 10px; font-weight: 500; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; text-align: center; }

  .size-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 8px; }
  .size-grid-bottom { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }

  .size-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 4px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .size-btn .num { display: block; font-size: 20px; font-weight: 500; color: var(--slate); line-height: 1; }
  .size-btn .unit { display: block; font-size: 10px; font-weight: 300; color: var(--muted); margin-top: 3px; }
  .size-btn.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 4px 12px rgba(44,82,130,0.25); }
  .size-btn.active .num { color: #fff; }
  .size-btn.active .unit { color: rgba(255,255,255,0.7); }

  .selected-info { text-align: center; font-size: 12px; color: var(--muted); font-weight: 300; letter-spacing: 1px; min-height: 20px; transition: color 0.2s; }
  .selected-info span { color: var(--accent); font-weight: 500; }

  .ar-btn-wrap { width: 100%; max-width: 360px; }
  a.ar-launch {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; background: var(--sky); color: #fff; text-decoration: none;
    padding: 18px; border-radius: 12px; font-family: inherit; font-size: 16px;
    font-weight: 700; letter-spacing: 2px;
    box-shadow: 0 6px 20px rgba(41,171,226,0.35);
    transition: opacity 0.15s, transform 0.1s;
  }
  a.ar-launch:active { opacity: 0.85; transform: scale(0.98); }
  a.ar-launch svg { width: 22px; height: 22px; stroke: #fff; fill: none; stroke-width: 2; flex-shrink: 0; }

  .ar-note { text-align: center; font-size: 11px; color: var(--muted); margin-top: 10px; font-weight: 300; line-height: 1.8; }

  footer { text-align: center; padding: 16px; font-size: 10px; color: var(--muted); letter-spacing: 1px; }
</style>
</head>
<body>

<header>
  <div class="logo">CRAFT<span>-MIND</span></div>
  <div class="header-sub">TV AR SIMULATOR</div>
</header>

<main>
  <svg class="tv-illustration" viewBox="0 0 140 116" fill="none" xmlns="http://www.w3.org/2000/svg">
    <line x1="52" y1="22" x2="40" y2="4" stroke="#2c5282" stroke-width="3" stroke-linecap="round"/>
    <line x1="88" y1="22" x2="100" y2="4" stroke="#2c5282" stroke-width="3" stroke-linecap="round"/>
    <rect x="14" y="22" width="112" height="72" rx="10" fill="white" stroke="#2c5282" stroke-width="2.5"/>
    <rect x="24" y="31" width="92" height="54" rx="5" fill="#dce8f5" stroke="#4a7ab5" stroke-width="1.5"/>
    <rect x="24" y="31" width="92" height="16" rx="5" fill="rgba(255,255,255,0.5)"/>
    <circle cx="70" cy="101" r="3" fill="#c8d8e8"/>
    <line x1="46" y1="94" x2="40" y2="110" stroke="#2c5282" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="94" y1="94" x2="100" y2="110" stroke="#2c5282" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="32" y1="110" x2="108" y2="110" stroke="#2c5282" stroke-width="2.5" stroke-linecap="round"/>
  </svg>

  <div class="title-block">
    <h1>壁掛けテレビ<br>ARシミュレーター</h1>
    <p>サイズを選んでARボタンをタップ<br>実寸で壁に映し出せます</p>
  </div>

  <div class="size-section">
    <div class="size-label">テレビサイズを選択</div>
    <div class="size-grid">
      <button class="size-btn" data-size="32" data-w="730" data-h="429"><span class="num">32</span><span class="unit">型</span></button>
      <button class="size-btn" data-size="43" data-w="960" data-h="544"><span class="num">43</span><span class="unit">型</span></button>
      <button class="size-btn" data-size="55" data-w="1227" data-h="708"><span class="num">55</span><span class="unit">型</span></button>
      <button class="size-btn" data-size="65" data-w="1449" data-h="837"><span class="num">65</span><span class="unit">型</span></button>
    </div>
    <div class="size-grid-bottom">
      <button class="size-btn" data-size="75" data-w="1676" data-h="970"><span class="num">75</span><span class="unit">型</span></button>
      <button class="size-btn" data-size="85" data-w="1895" data-h="1066"><span class="num">85</span><span class="unit">型</span></button>
      <button class="size-btn" data-size="100" data-w="2214" data-h="1245"><span class="num">100</span><span class="unit">型</span></button>
    </div>
    <div class="selected-info" id="selected-info">サイズを選択してください</div>
  </div>

  <div class="ar-btn-wrap">
    <a id="ar-btn" class="ar-launch" rel="ar" href="#">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      ARで確認する
    </a>
    <div class="ar-note">iPhone / iPad の Safari でご利用ください</div>
  </div>
</main>

<footer>© CRAFT-MIND</footer>

<script>
const USDZ_BASE = 'https://m-aoki-ship-it.github.io/kabekake_simulatar';
let selectedSize = null;

const arBtn = document.getElementById('ar-btn');
const infoEl = document.getElementById('selected-info');

document.querySelectorAll('.size-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedSize = btn.dataset.size;
    const w = btn.dataset.w;
    const h = btn.dataset.h;
    infoEl.innerHTML = `<span>${selectedSize}型</span>　${w} × ${h} mm`;
    arBtn.href = `${USDZ_BASE}/tv_${selectedSize}inch.usdz`;
  });
});

arBtn.addEventListener('click', e => {
  if (!selectedSize) {
    e.preventDefault();
    infoEl.style.color = '#e63946';
    infoEl.textContent = '先にサイズを選択してください';
    setTimeout(() => {
      infoEl.style.color = '';
      infoEl.textContent = 'サイズを選択してください';
    }, 2000);
  }
});
</script>
</body>
</html>
