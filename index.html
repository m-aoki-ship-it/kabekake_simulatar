<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>壁掛けテレビ シミュレーター | Craft-Mind</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@300;400;500;700;800&display=swap');

  :root {
    --bg:        #f7f6f4;
    --surface:   #ffffff;
    --navy:      #2c3e50;
    --slate:     #4a6280;
    --accent:    #2c5282;
    --accent-lt: #ebf0f8;
    --muted:     #8a9ab0;
    --border:    #dde3ea;
    --text:      #2c3e50;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'M PLUS Rounded 1c', 'Hiragino Maru Gothic Pro', sans-serif;
    font-weight: 300;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    z-index: 100;
    flex-shrink: 0;
  }
  .logo {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 4px;
    color: var(--navy);
    text-transform: uppercase;
  }
  .logo span { color: var(--accent); }
  .header-tag {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 300;
  }

  /* ── CAMERA VIEW ── */
  #camera-container {
    position: relative;
    flex: 1;
    overflow: hidden;
    background: #1a1e24;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Wall detection canvas */
  #detect-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #detect-canvas.active { opacity: 1; }

  /* TV overlay */
  #tv-overlay {
    position: absolute;
    cursor: grab;
    user-select: none;
    touch-action: none;
    filter: drop-shadow(0 6px 24px rgba(0,0,0,0.6));
    transform-origin: center center;
    display: none;
  }
  #tv-overlay.visible { display: block; }
  #tv-overlay:active { cursor: grabbing; }
  #tv-svg { width: 100%; height: 100%; }

  /* Resize handle */
  .resize-handle {
    position: absolute;
    bottom: -6px;
    right: -6px;
    width: 24px;
    height: 24px;
    background: var(--accent);
    border-radius: 2px;
    cursor: se-resize;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: none;
    z-index: 10;
  }
  .resize-handle svg { width: 12px; height: 12px; fill: #fff; }

  /* Size badge */
  #tv-size-badge {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.5);
    color: #fff;
    font-size: clamp(11px, 2.5vw, 16px);
    font-weight: 300;
    letter-spacing: 2px;
    padding: 3px 10px;
    border-radius: 2px;
    pointer-events: none;
    white-space: nowrap;
  }

  /* ── START SCREEN ── */
  #start-screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, #eef2f7 0%, #dce6f0 100%);
    z-index: 50;
    gap: 20px;
    padding: 40px 28px;
  }
  .start-logo {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 5px;
    color: var(--navy);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .start-icon {
    width: 120px;
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .start-icon svg { width: 120px; height: 100px; }
  .start-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 2px;
    text-align: center;
    line-height: 1.5;
    color: var(--navy);
    margin-top: 4px;
  }
  .start-sub {
    font-size: 13px;
    font-weight: 400;
    color: var(--slate);
    text-align: center;
    line-height: 2;
    letter-spacing: 0.5px;
  }
  #start-btn {
    background: #29abe2;
    color: #fff;
    border: none;
    padding: 16px 0;
    width: 100%;
    max-width: 280px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 2px;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 8px;
    box-shadow: 0 4px 18px rgba(41, 171, 226, 0.35), 0 1px 4px rgba(41,171,226,0.2);
  }
  #start-btn:active { opacity: 0.88; transform: scale(0.98); }

  /* ── BOTTOM PANEL ── */
  #bottom-panel {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 16px 20px 20px;
    flex-shrink: 0;
    z-index: 100;
  }

  .panel-label {
    font-size: 9px;
    font-weight: 400;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* Size selector */
  .size-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
    margin-bottom: 14px;
  }
  .size-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--slate);
    padding: 8px 2px;
    border-radius: 2px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 300;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .size-btn .inch {
    display: block;
    font-size: 10px;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 1px;
    margin-top: 1px;
  }
  .size-btn.active {
    background: var(--surface);
    border-color: var(--accent);
    color: var(--accent);
  }
  .size-btn.active .inch { color: var(--accent); opacity: 0.7; }

  /* Action row */
  .action-row {
    display: flex;
    gap: 8px;
  }
  .action-btn {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--slate);
    padding: 12px 8px;
    border-radius: 2px;
    font-family: inherit;
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 1px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
  }
  .action-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.6; }
  .action-btn.active {
    background: var(--accent-lt);
    border-color: var(--accent);
    color: var(--accent);
  }
  .action-btn span { font-size: 9px; letter-spacing: 1.5px; }

  /* Info overlay */
  #info-box {
    position: absolute;
    top: 14px;
    left: 14px;
    background: rgba(255,255,255,0.92);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 10px 14px;
    font-size: 11px;
    display: none;
    pointer-events: none;
    backdrop-filter: blur(12px);
  }
  #info-box.visible { display: block; }
  #info-box .info-label {
    color: var(--muted);
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 400;
  }
  #info-box .info-val {
    color: var(--accent);
    font-size: 16px;
    font-weight: 300;
    letter-spacing: 2px;
    margin-top: 2px;
  }

  /* Detect hint */
  #detect-hint {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.9);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 6px 16px;
    border-radius: 2px;
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 2px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s;
    white-space: nowrap;
  }
  #detect-hint.show { opacity: 1; }

  /* Permission error */
  #perm-error {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    text-align: center;
    padding: 40px;
    z-index: 60;
    background: var(--bg);
  }
  #perm-error.show { display: flex; }
  #perm-error p { color: var(--muted); font-size: 13px; line-height: 2; font-weight: 300; }
  #perm-error strong { color: var(--navy); font-size: 14px; font-weight: 500; letter-spacing: 1px; }
</style>
</head>
<body>

<header>
  <div class="logo">CRAFT<span>-MIND</span></div>
  <div class="header-tag">TV Wall Simulator</div>
</header>

<div id="camera-container">

  <canvas id="detect-canvas"></canvas>

  <!-- TV overlay -->
  <div id="tv-overlay">
    <svg id="tv-svg" viewBox="0 0 160 100" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="0" width="160" height="95" rx="2" ry="2" fill="#1c1c1e" stroke="#383838" stroke-width="0.5"/>

<script>
// ── GITHUB PAGES BASE URL ──
const USDZ_BASE = 'https://m-aoki-ship-it.github.io/kabekake_simulatar/usdz';

// ── TV SIZE DATA ──
const TV_SIZES = {
  32:  { w: 730,  h: 429  },
  43:  { w: 960,  h: 544  },
  55:  { w: 1227, h: 708  },
  65:  { w: 1449, h: 837  },
  75:  { w: 1676, h: 970  },
  85:  { w: 1895, h: 1066 },
  100: { w: 2214, h: 1245 },
};

let currentSize = 55;
let stream = null;
let facingMode = 'environment';
let detectActive = false;
let detecting = false;

// TV position & size state
let tvState = {
  x: 0, y: 0,
  width: 0, height: 0,
};

const video = document.getElementById('video');
const tvOverlay = document.getElementById('tv-overlay');
const detectCanvas = document.getElementById('detect-canvas');
const detectCtx = detectCanvas.getContext('2d');
const startScreen = document.getElementById('start-screen');
const permError = document.getElementById('perm-error');
const infoBox = document.getElementById('info-box');
const detectHint = document.getElementById('detect-hint');
const infoSize = document.getElementById('info-size');
const infoDims = document.getElementById('info-dims');
const tvSizeBadge = document.getElementById('tv-size-badge');

// ── START CAMERA ──
document.getElementById('start-btn').addEventListener('click', startCamera);

async function startCamera() {
  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    startScreen.style.display = 'none';
    initTV();
    infoBox.classList.add('visible');
    updateInfo();
  } catch (e) {
    startScreen.style.display = 'none';
    permError.classList.add('show');
  }
}

// ── INIT TV POSITION ──
function initTV() {
  const cw = document.getElementById('camera-container').clientWidth;
  const ch = document.getElementById('camera-container').clientHeight;
  const tvW = cw * 0.55;
  const tvH = tvW * (9/16);
  tvState.width = tvW;
  tvState.height = tvH;
  tvState.x = (cw - tvW) / 2;
  tvState.y = (ch - tvH) / 2;
  applyTV();
  tvOverlay.classList.add('visible');
}

function applyTV() {
  tvOverlay.style.left = tvState.x + 'px';
  tvOverlay.style.top = tvState.y + 'px';
  tvOverlay.style.width = tvState.width + 'px';
  tvOverlay.style.height = tvState.height + 'px';
}

// ── SIZE SELECTION ──
document.getElementById('size-grid').addEventListener('click', e => {
  const btn = e.target.closest('.size-btn');
  if (!btn) return;
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentSize = parseInt(btn.dataset.size);
  updateInfo();
  // Resize TV maintaining center
  if (tvOverlay.classList.contains('visible')) {
    const cx = tvState.x + tvState.width / 2;
    const cy = tvState.y + tvState.height / 2;
    const cw = document.getElementById('camera-container').clientWidth;
    const newW = cw * (0.35 + (currentSize - 32) / (75 - 32) * 0.4);
    const newH = newW * (9/16);
    tvState.width = newW;
    tvState.height = newH;
    tvState.x = cx - newW / 2;
    tvState.y = cy - newH / 2;
    applyTV();
  }
});

function updateInfo() {
  const d = TV_SIZES[currentSize];
  infoSize.textContent = currentSize + '型';
  infoDims.textContent = d.w + ' × ' + d.h + ' mm';
  tvSizeBadge.textContent = currentSize + '型';
}

// ── DRAG (touch & mouse) ──
let dragging = false, dragStartX, dragStartY, dragTvX, dragTvY;
let resizing = false, resizeStartX, resizeStartY, resizeStartW, resizeStartH;

tvOverlay.addEventListener('pointerdown', e => {
  if (e.target.closest('#resize-handle')) return;
  dragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  dragTvX = tvState.x;
  dragTvY = tvState.y;
  tvOverlay.setPointerCapture(e.pointerId);
  e.preventDefault();
});

document.getElementById('resize-handle').addEventListener('pointerdown', e => {
  resizing = true;
  resizeStartX = e.clientX;
  resizeStartY = e.clientY;
  resizeStartW = tvState.width;
  resizeStartH = tvState.height;
  e.target.setPointerCapture(e.pointerId);
  e.stopPropagation();
  e.preventDefault();
});

window.addEventListener('pointermove', e => {
  if (dragging) {
    tvState.x = dragTvX + (e.clientX - dragStartX);
    tvState.y = dragTvY + (e.clientY - dragStartY);
    applyTV();
  }
  if (resizing) {
    const dx = e.clientX - resizeStartX;
    const newW = Math.max(80, resizeStartW + dx);
    const newH = newW * (9/16);
    tvState.width = newW;
    tvState.height = newH;
    applyTV();
  }
});

window.addEventListener('pointerup', () => { dragging = false; resizing = false; });

// ── WALL DETECTION ──
document.getElementById('detect-btn').addEventListener('click', () => {
  detectActive = !detectActive;
  document.getElementById('detect-btn').classList.toggle('active', detectActive);
  detectCanvas.classList.toggle('active', detectActive);
  if (detectActive) {
    detectHint.classList.add('show');
    setTimeout(() => detectHint.classList.remove('show'), 2000);
    runDetection();
  } else {
    detecting = false;
    detectCtx.clearRect(0, 0, detectCanvas.width, detectCanvas.height);
  }
});

let offCanvas = document.createElement('canvas');
let offCtx = offCanvas.getContext('2d');

function runDetection() {
  if (!detectActive) return;
  detecting = true;

  const container = document.getElementById('camera-container');
  const W = container.clientWidth;
  const H = container.clientHeight;

  detectCanvas.width = W;
  detectCanvas.height = H;
  offCanvas.width = W;
  offCanvas.height = H;

  offCtx.drawImage(video, 0, 0, W, H);
  const imgData = offCtx.getImageData(0, 0, W, H);
  const data = imgData.data;

  // Find largest uniform (wall-like) region
  // Sample grid 20x20, check brightness variance
  const gridW = 20, gridH = 20;
  const cellW = W / gridW, cellH = H / gridH;
  const brightness = [];

  for (let gy = 0; gy < gridH; gy++) {
    for (let gx = 0; gx < gridW; gx++) {
      let sum = 0, count = 0;
      const px = Math.floor(gx * cellW + cellW/2);
      const py = Math.floor(gy * cellH + cellH/2);
      const idx = (py * W + px) * 4;
      const r = data[idx], g = data[idx+1], b = data[idx+2];
      const br = (r * 0.299 + g * 0.587 + b * 0.114);
      brightness.push(br);
    }
  }

  // Find mean brightness
  const mean = brightness.reduce((a,b)=>a+b,0)/brightness.length;
  // Mark "wall" cells: bright + close to mean (uniform)
  const threshold = 40;
  const wallMask = brightness.map(b => Math.abs(b - mean) < threshold && b > 60);

  // Draw overlay
  detectCtx.clearRect(0, 0, W, H);

  // Find bounding box of wall region
  let minX = gridW, maxX = 0, minY = gridH, maxY = 0;
  let wallCount = 0;
  wallMask.forEach((isWall, i) => {
    if (!isWall) return;
    wallCount++;
    const gx = i % gridW;
    const gy = Math.floor(i / gridW);
    if (gx < minX) minX = gx;
    if (gx > maxX) maxX = gx;
    if (gy < minY) minY = gy;
    if (gy > maxY) maxY = gy;
  });

  if (wallCount > 20) {
    const rx = minX * cellW;
    const ry = minY * cellH;
    const rw = (maxX - minX + 1) * cellW;
    const rh = (maxY - minY + 1) * cellH;

    // Highlight wall area
    detectCtx.strokeStyle = 'rgba(232,184,75,0.8)';
    detectCtx.lineWidth = 2;
    detectCtx.setLineDash([8, 6]);
    detectCtx.strokeRect(rx + 4, ry + 4, rw - 8, rh - 8);
    detectCtx.setLineDash([]);

    // Corner marks
    const corners = [[rx+4,ry+4],[rx+rw-4,ry+4],[rx+4,ry+rh-4],[rx+rw-4,ry+rh-4]];
    detectCtx.strokeStyle = 'rgba(232,184,75,1)';
    detectCtx.lineWidth = 3;
    corners.forEach(([cx,cy]) => {
      const s = 16;
      detectCtx.beginPath();
      const dx = cx < W/2 ? 1 : -1;
      const dy = cy < H/2 ? 1 : -1;
      detectCtx.moveTo(cx, cy + dy*s);
      detectCtx.lineTo(cx, cy);
      detectCtx.lineTo(cx + dx*s, cy);
      detectCtx.stroke();
    });

    // Snap TV to wall region (animate)
    const tvTargetX = rx + (rw - tvState.width) / 2;
    const tvTargetY = ry + (rh - tvState.height) / 2;
    // Only snap if TV is roughly inside wall area
    const tvCX = tvState.x + tvState.width/2;
    const tvCY = tvState.y + tvState.height/2;
    if (tvCX > rx && tvCX < rx+rw && tvCY > ry && tvCY < ry+rh) {
      // Subtle center snap
      tvState.x += (tvTargetX - tvState.x) * 0.05;
      tvState.y += (tvTargetY - tvState.y) * 0.05;
      applyTV();
    }

    // Label
    detectCtx.fillStyle = 'rgba(232,184,75,0.9)';
    detectCtx.font = '11px Noto Sans JP';
    detectCtx.fillText('壁面検出', rx + 10, ry + 20);
  }

  if (detectActive) requestAnimationFrame(runDetection);
}

// ── AR QUICKLOOK ──
document.getElementById('ar-btn').addEventListener('click', () => {
  const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
  if (!isIOS) {
    alert('AR機能はiOS（iPhone/iPad）のSafariでご利用いただけます。');
    return;
  }
  const url = `${USDZ_BASE}/tv_${currentSize}inch.usdz`;
  const link = document.getElementById('ar-link');
  link.href = url;
  link.click();
});

// ── CAMERA FLIP ──
document.getElementById('flip-btn').addEventListener('click', async () => {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  await startCamera();
});

// ── SCREENSHOT ──
document.getElementById('snap-btn').addEventListener('click', () => {
  const container = document.getElementById('camera-container');
  const W = container.clientWidth;
  const H = container.clientHeight;
  const snapCanvas = document.getElementById('snap-canvas');
  snapCanvas.width = W;
  snapCanvas.height = H;
  const ctx = snapCanvas.getContext('2d');

  // Draw video
  ctx.drawImage(video, 0, 0, W, H);

  // Draw TV overlay
  if (tvOverlay.classList.contains('visible')) {
    const tvImg = new Image();
    const svgBlob = new Blob([document.getElementById('tv-svg').outerHTML], {type:'image/svg+xml'});
    const url = URL.createObjectURL(svgBlob);
    tvImg.onload = () => {
      ctx.save();
      ctx.filter = 'drop-shadow(0 8px 24px rgba(0,0,0,0.8))';
      ctx.drawImage(tvImg, tvState.x, tvState.y, tvState.width, tvState.height);
      ctx.restore();
      // Badge
      ctx.fillStyle = 'rgba(0,0,0,0.65)';
      const bw = 80, bh = 28;
      const bx = tvState.x + tvState.width/2 - bw/2;
      const by = tvState.y + tvState.height/2 - bh/2;
      ctx.beginPath();
      ctx.roundRect(bx, by, bw, bh, 4);
      ctx.fill();
      ctx.fillStyle = '#e8b84b';
      ctx.font = 'bold 16px Bebas Neue, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(currentSize + '型', tvState.x + tvState.width/2, tvState.y + tvState.height/2 + 6);
      ctx.textAlign = 'left';
      // Watermark
      ctx.fillStyle = 'rgba(232,184,75,0.7)';
      ctx.font = '12px Bebas Neue, sans-serif';
      ctx.fillText('CRAFT-MIND', 12, H - 12);
      URL.revokeObjectURL(url);
      // iOS対応: Web Share API → なければ通常DL
      snapCanvas.toBlob(async (blob) => {
        const file = new File([blob], 'tv-simulation.png', { type: 'image/png' });
        if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
          try {
            await navigator.share({ files: [file], title: '壁掛けテレビシミュレーション' });
          } catch(e) { /* キャンセル等 */ }
        } else {
          // フォールバック: 通常ダウンロード
          const link = document.createElement('a');
          link.download = 'tv-simulation.png';
          link.href = URL.createObjectURL(blob);
          link.click();
          setTimeout(() => URL.revokeObjectURL(link.href), 1000);
        }
      }, 'image/png');
    };
    tvImg.src = url;
  }
});
</script>
